version: '3'

services:
  pib-blockly-server:
    image: pib-blockly-server
    build:
      context: ./pib_blockly/pib_blockly_server
      dockerfile: ./Dockerfile
    command: "node /app/dist/pib_blockly_server_bundle.js"
    networks:
      - pib-network
    ports:
      - "2442:2442"
    restart: always

  flask-app:
    image: flask_api
    build:
      context: .
      dockerfile: ./pib_api/flask/Dockerfile
    command: "bash -c 'flask --app run db upgrade && flask --app run seed_db && flask --app run run --host 0.0.0.0'"
    networks:
      - pib-network
    ports:
      - "5000:5000"
    environment:
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/pibdata.db
      - PIB_BLOCKLY_SERVER_URL=http://pib-blockly-server:2442
    volumes:
      - ./pib_api/flask/:/app
      - programs:/root/cerebra_programs
    restart: always
    depends_on:
      - pib-blockly-server

  rosbridge-ws:
    build:
      context: ./ros_packages
      dockerfile: ./rosbridge/Dockerfile
    command: ros2 launch rosbridge_server rosbridge_websocket_launch.xml
    networks:
      pib-network:
        aliases:
          - rosbridge-dds
    volumes:
      - ./ros_packages/cyclone_rosbridge.xml:/app/cyclone_unicast.xml
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/cyclone_unicast.xml
    restart: always
    ports:
      - "9090:9090"

  ros-camera:
    image: ros-camera
    privileged: true
    build:
      context: ./ros_packages
      dockerfile: ./camera/Dockerfile
    command: ros2 run oak_d_lite stereo
    profiles:
      - all
      - camera
    # Volume binding should not be necessary here,
    # but removing will stop the camera from showing pictures for some reason
    volumes:
      - /dev/:/dev/
    devices:
      - /dev/bus/usb:/dev/bus/usb
    networks:
      - pib-network
    restart: always
    depends_on:
      - rosbridge-ws

  ros-motors:
    image: ros_motors
    build:
      context: .
      dockerfile: ./ros_packages/motors/Dockerfile
    command: ros2 launch motors launch.py
    profiles:
      - all
      - motors
    networks:
      pib-network:
        aliases:
          - ros-motors-dds
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ros_packages/cyclone_motors.xml:/app/cyclone_unicast.xml
    environment:
      - FLASK_API_BASE_URL=http://flask-app:5000
      - PIB_BLOCKLY_SERVER_URL=http://pib-blockly-server:2442
      - TINKERFORGE_HOST=host.docker.internal
      - TINKERFORGE_PORT=4223
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/cyclone_unicast.xml
    restart: always
    depends_on:
      - rosbridge-ws
      - flask-app

  trajectory-relay-sender:
    image: ros_motors
    command: bash -lc "source /opt/ros/humble/setup.bash && source /app/ros2_ws/install/setup.bash && python3 /app/trajectory_relay_sender.py"
    profiles:
      - relay_sender
    networks:
      pib-network:
        aliases:
          - trajectory-relay-sender
    volumes:
      - ./ros_packages/cyclone_motors.xml:/app/cyclone_unicast.xml
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/cyclone_unicast.xml
      - TRAJECTORY_RELAY_REMOTE_HOST=${TRAJECTORY_RELAY_REMOTE_HOST:-192.168.220.149}
      - TRAJECTORY_RELAY_REMOTE_PORT=${TRAJECTORY_RELAY_REMOTE_PORT:-15555}
    restart: always
    depends_on:
      - ros-motors

  trajectory-relay-receiver:
    image: ros_motors
    command: bash -lc "source /opt/ros/humble/setup.bash && source /app/ros2_ws/install/setup.bash && python3 /app/trajectory_relay_receiver.py"
    profiles:
      - relay_receiver
    networks:
      pib-network:
        aliases:
          - trajectory-relay-receiver
    volumes:
      - ./ros_packages/cyclone_motors.xml:/app/cyclone_unicast.xml
    environment:
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/cyclone_unicast.xml
      - TRAJECTORY_RELAY_LISTEN_HOST=0.0.0.0
      - TRAJECTORY_RELAY_LISTEN_PORT=${TRAJECTORY_RELAY_LISTEN_PORT:-15555}
    ports:
      - "${TRAJECTORY_RELAY_LISTEN_PORT:-15555}:${TRAJECTORY_RELAY_LISTEN_PORT:-15555}"
    restart: always
    depends_on:
      - ros-motors
      
  pibsim_webots:
    image: pibsim_webots
    build:
      context: .
      dockerfile: ./ros_packages/pibsim_webots/Dockerfile
    command: ros2 launch pibsim_webots pib_launch.py
    volumes:
      # this is a socket that is used by the x-windowing-system
      # for communication between clients and servers on the same
      # machine. By mounting the socket of the docker-host, the 
      # display-node uses the x-server running on the host for
      # graphics-related communication
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./ros_packages/cyclone_webots.xml:/app/cyclone_unicast.xml
    profiles:
      - pibsim_webots
    networks:
      pib-network:
        aliases:
          - pibsim-webots-dds
    environment:
      - DISPLAY=:0.0
      - USER=root
      - USERNAME=root
      - ROS_DOMAIN_ID=0
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///app/cyclone_unicast.xml
    depends_on:
      - ros-motors
    restart: no

  ros-voice-assistant:
    image: ros_voice_assistant
    build:
      context: .
      dockerfile: ./ros_packages/voice_assistant/Dockerfile
    command: ros2 launch voice_assistant launch.py
    privileged: true
    profiles:
      - all
      - voice_assistant
    networks:
      - pib-network
    env_file:
      - ros-audio.env
      - password.env
    environment:
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
      - ALSA_CARD=Generic
      - FLASK_API_BASE_URL=http://flask-app:5000
      - VOICE_ASSISTANT_DIR=/app/ros2_ws/voice_assistant
    volumes:
      - /media/dyan/project/projects/voice/:/data/voice
      - /dev/snd:/dev/snd
      - /dev/dsp:/dev/dsp
      - /etc/machine-id:/etc/machine-id
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
      - /home/pib/.config/pulse/cookie:/root/.config/pulse/cookie
    devices:
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb1
    restart: always
    depends_on:
      - rosbridge-ws
      - flask-app
      - pib-blockly-server
      - ros-audio-io

  ros-programs:
    image: ros_programs
    build:
      context: .
      dockerfile: ./ros_packages/programs/Dockerfile
    command: ros2 launch programs launch.py
    profiles:
      - all
      - programs
    environment:
      - FLASK_API_BASE_URL=http://flask-app:5000
      - PIB_BLOCKLY_SERVER_URL=http://pib-blockly-server:2442
      - TINKERFORGE_HOST=host.docker.internal
      - TINKERFORGE_PORT=4223
      - PYTHON_BINARY=/usr/bin/python3
      - PROGRAM_DIR=/ros2_ws/cerebra_programs
      - VOICE_ASSISTANT_DIR=/app/ros2_ws/voice_assistant
    volumes:
      - programs:/ros2_ws/cerebra_programs
    restart: always
    networks:
      - pib-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rosbridge-ws
      - pib-blockly-server
      - flask-app

  ros-display:
    image: ros-display
    privileged: true
    build:
      context: .
      dockerfile: ./ros_packages/display/Dockerfile
    profiles:
      - all
      - display
    volumes:
      # this is a socket that is used by the x-windowing-system
      # for cmmunication betweem clients and servers on the same
      # machine. By mounting the socket of the docker-host, the 
      # display-node uses the x-server running on the host for
      # graphics-related communication
      - /tmp/.X11-unix:/tmp/.X11-unix 
    environment:
      - STATIC_IMAGE_DIR=/app/ros2_ws/display/static_images
      - DISPLAY=:0.0
    command: ros2 launch display launch.py
    restart: always
    networks:
      - pib-network

  ros-audio-io:
    image: ros-audio-io
    build:
     context: .
     dockerfile: ./ros_packages/ros_audio_io/Dockerfile
    command: ros2 launch ros_audio_io launch.py
    profiles:
      - all
      - ros_audio_io
      - voice_assistant
    networks:
      - pib-network
    env_file:
      - ros-audio.env
    environment:
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
    devices:
      - /dev/snd:/dev/snd
      - /dev/bus/usb:/dev/bus/usb1
    privileged: true
    volumes:
      - /media/dyan/project/projects/voice/:/data/voice
      - /dev/snd:/dev/snd
      - /dev/dsp:/dev/dsp
      - /etc/machine-id:/etc/machine-id
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
      - /home/pib/.config/pulse/cookie:/root/.config/pulse/cookie
    restart: always
    depends_on:
      - rosbridge-ws

volumes:
  programs:

networks:
  pib-network:
    driver: bridge

